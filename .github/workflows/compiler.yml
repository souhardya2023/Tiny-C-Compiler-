name: Tiny C Compiler CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y flex bison gcc

    - name: Build compiler
      run: |
        flex src/basiccodegen.l
        bison -d src/basiccodegen.y
        gcc -o compiler src/main.c lex.yy.c y.tab.c -w

    - name: Run test
      run: |
        ./compiler tests/test1.txt