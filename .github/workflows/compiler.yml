name: Tiny C Compiler CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y flex bison gcc

    - name: Build compiler
      run: |
        yacc -d src/basiccodegen.y
        lex src/basiccodegen.l
        gcc src/main.c -o compiler -I.

    - name: Run test
      run: |
        ./compiler tests/test1.txt
